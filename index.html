<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shashi's Zone · kiranic</title>
    <meta name="description" content="A playful learning zone for kids — flashcards, alphabets, and more.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <meta name="theme-color" content="#297081">
    <meta property="og:site_name" content="Kiranic">
</head>
<body>
    <header>
        <h1>Shashi's Zone</h1>
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
    </header>

    <!-- Embedded translate.spotrot.com iframe -->
<!--
    <section id="translator-embed" style="padding: 1rem;">
        <iframe
            src="https://translate.kiranic.com"
            title="Translate"
            style="width: 100%; height: 320px; border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"
        ></iframe>
    </section>
-->
    <main id="grid-container">
        <!-- Learning modules will be added here dynamically by JavaScript -->
    </main>

    <div id="fullscreen-overlay" class="hidden">
        <div id="fullscreen-content">
            <div id="fullscreen-scrollable-area">
                <img id="fullscreen-image" src="" alt="Fullscreen Image">
                <p id="filename-display"></p>
            </div>
            <button id="prev-button">< Prev</button>
            <button id="next-button">Next ></button>
            <button id="close-button">Go Back</button>
        </div>
    </div>

    <footer style="text-align:center; padding: 1.5rem 1rem; opacity: 0.7;">
        <a href="https://kiranic.com" style="display:inline-block; color: inherit; text-decoration: none;" aria-label="Made by Kiranic">
            <img src="made-by-kiranic.svg" alt="made by kiranic" height="20">
        </a>
    </footer>

    <script src="script.js"></script>

    <!-- Fullscreen Iframe Popup -->
    <div id="iframe-popup" class="hidden">
        <div id="iframe-content">
            <iframe id="iframe-viewer" src="" frameborder="0"></iframe>
            <button onclick="closeIframePopup()">Go Back</button>
        </div>
    </div>

</body>
</html>
